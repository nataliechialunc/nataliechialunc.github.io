name: Scrape Talk Locations
on:
  push:
    paths:
      - '_talks/**'
      - 'talkmap.py'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        pip install pandas requests beautifulsoup4 geopy python-frontmatter getorg --upgrade
    - name: Run talkmap script
      run: |
        python talkmap.py
    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Automated update of talk locations" || echo "No changes to commit"
        git push
